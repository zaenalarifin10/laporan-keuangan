<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gacha Rekomendasi Lagu</title>

</head>
<body>

    <h1>🎵 Gacha Rekomendasi Lagu 🎵</h1>
    
    <div class="points-container">
        <div class="points-box">Poin Kamu: <span id="points-display">100</span> LP</div>
        <button class="reset-btn" onclick="resetPoints()">Reset Poin</button>
    </div>
    
    <button class="gacha-btn" id="gacha-button" onclick="doGacha()" disabled>Memuat Database...</button>

    <div class="preview-container" id="preview-box">
        <h3>🎉 Hasil Gacha: <span id="result-title">Judul Lagu</span> [<span id="result-category">Genre</span>]</h3>
        <div id="youtube-embed"></div>
    </div>
    
    <a class="nav-link" href="add.html">Tambah Lagu Baru di Sini</a>



    <script {timestamp="2026"}>
        // Konfigurasi JsonBin milikmu
        const BIN_ID = "6a23440ada38895dfe8e88a7";
        const API_KEY = "$2a$10$r7I.AEjQuUfcR1rKNWFanuDpJcYhqz.EmTPRL3aWxY3H.hiGx6ZmC"; 

        let songDatabase = [];
        let currentPoints = 0;

        // 1. Logika Pengaturan Poin Pengunjung
        


        // 2. Ambil data database lagu dari JsonBin saat halaman dibuka
        function loadDatabase() {
            fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                method: 'GET',
                headers: {
                    'X-Master-Key': API_KEY
                }
            })
            .then(res => {
                if (!res.ok) throw new Error("Gagal memuat data dari server");
                return res.json();
            })
            .then(data => {
                songDatabase = data.record;
                // Jalankan pengecekan tombol gacha setelah data siap
                updateGachaButtonState();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('gacha-button').textContent = "Gagal memuat database.";
            });
        }

        // 3. Fungsi eksekusi Gacha
        
        
        loadDatabase();
    </script>
</body>
</html>
