<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan - Buku Bank</title>
    <!-- Menghubungkan ke file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Buku Kas & Bank</h1>

    <div class="action-bar">
        <button class="btn-add" onclick="toggleModal(true)">+ Tambah Transaksi</button>
        <div class="saldo-box">Total Saldo: <strong id="total-saldo">Rp 0</strong></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Tanggal</th>
                    <th style="width: 35%;">Prihal / Keterangan</th>
                    <th style="width: 15%;">Pengguna</th>
                    <th style="width: 17%;" class="text-right">Deposit (+)</th>
                    <th style="width: 17%;" class="text-right">Pengeluaran (-)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="5" class="loading">Memuat data dari server JSONBin...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Pop-up Form (Modal) -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>Tambah Aksi Kas</h2>
        <form id="transaksiForm">
            <div class="form-group">
                <label for="tanggal">Tanggal</label>
                <input type="date" id="tanggal" required>
            </div>
            <div class="form-group">
                <label for="prihal">Prihal / Keterangan</label>
                <input type="text" id="prihal" placeholder="Contoh: Bayar Listrik" required>
            </div>
            <div class="form-group">
                <label for="pengguna">Pengguna</label>
                <input type="text" id="pengguna" placeholder="Nama penginput" required>
            </div>
            <div class="form-group">
                <label for="jenis">Jenis Transaksi</label>
                <select id="jenis">
                    <option value="deposit">Deposit (Masuk)</option>
                    <option value="pengeluaran">Pengeluaran (Keluar)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nominal">Nominal (Rp)</label>
                <input type="number" id="nominal" min="1" placeholder="0" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="toggleModal(false)">Batal</button>
                <button type="submit" class="btn-submit" id="btnSimpan">Simpan Data</button>
            </div>
        </form>
    </div>
</div>

<!-- PENTING: Menggunakan Axios CDN untuk kestabilan koneksi di GitHub Pages -->
<script src="https://jsdelivr.net"></script>
<!-- Menghubungkan ke file JavaScript eksternal -->
<script src="script.js"></script>
</body>
</html>
